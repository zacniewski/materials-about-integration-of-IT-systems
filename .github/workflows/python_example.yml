name: Python Example CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'examples/github_actions/python/**'
      - '.github/workflows/python_example.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'examples/github_actions/python/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r examples/github_actions/python/requirements.txt

    - name: Run tests with pytest
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/examples/github_actions/python
        pytest examples/github_actions/python/test_main.py
