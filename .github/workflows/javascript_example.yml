name: JavaScript Example CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'examples/github_actions/javascript/**'
      - '.github/workflows/javascript_example.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'examples/github_actions/javascript/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      working-directory: examples/github_actions/javascript
      run: npm install

    - name: Run tests
      working-directory: examples/github_actions/javascript
      run: npm test
